apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 39.0.7
    helm:
      releaseName: traefik
      values: |
        deployment:
          replicas: 1

        service:
          type: NodePort

        ports:
          web:
            nodePort: 30000
          websecure:
            nodePort: 30443

        ingressRoute:
          dashboard:
            enabled: true

        additionalArguments:
          - "--api.dashboard=true"
          - "--api.insecure=true"
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
